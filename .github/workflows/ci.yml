name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Run tests
        run: python -m pytest -q
      - name: Validate task docs
        run: python scripts/check_task_docs.py tasks/repo-harness-bootstrap
